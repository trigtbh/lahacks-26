<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voice Transcriber</title>
</head>
<body>
  <h1>Voice Transcriber</h1>
  <p id="status">Initializing mic...</p>
  <label>Silence threshold: <input type="range" id="thresholdSlider" min="1" max="60" value="12"> <span id="thresholdVal">12</span></label>
  <p><strong>Transcript:</strong></p>
  <pre id="result"></pre>

  <script>
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    // --- VAD config ---
    let SILENCE_THRESHOLD    = 12;    // live-updated by slider
    const SILENCE_DURATION_MS = 1500;
    const MIN_SPEECH_MS       = 400;

    let audioCtx, analyser, mediaRecorder, stream;
    let isSpeaking       = false;
    let speechStartTime  = 0;
    let silenceStartTime = null;

    // Active recording session state
    let recordingId  = null;   // UUID assigned by /audio/start
    let chunkMimeType = '';

    const slider       = document.getElementById('thresholdSlider');
    const thresholdVal = document.getElementById('thresholdVal');
    slider.addEventListener('input', () => {
      SILENCE_THRESHOLD = Number(slider.value);
      thresholdVal.textContent = slider.value;
    });

    // -----------------------------------------------------------------------
    // Init
    // -----------------------------------------------------------------------
    async function init() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        statusEl.textContent = 'Mic access denied: ' + e.message;
        return;
      }

      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);

      setInterval(vadTick, 100);
      statusEl.textContent = 'Listening...';
    }

    // -----------------------------------------------------------------------
    // VAD loop
    // -----------------------------------------------------------------------
    function vadTick() {
      const buf = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(buf);
      const rms = Math.sqrt(buf.reduce((s, v) => s + v * v, 0) / buf.length);
      const now = Date.now();

      if (rms > SILENCE_THRESHOLD) {
        if (!isSpeaking) {
          isSpeaking      = true;
          speechStartTime = now;
          silenceStartTime = null;
          onSpeechStart();
        }
      } else {
        if (isSpeaking) {
          if (silenceStartTime === null) {
            silenceStartTime = now;
          } else if (now - silenceStartTime >= SILENCE_DURATION_MS) {
            isSpeaking       = false;
            silenceStartTime = null;
            const duration   = now - speechStartTime;
            onSpeechEnd(duration >= MIN_SPEECH_MS);
          }
        }
      }
    }

    // -----------------------------------------------------------------------
    // Speech-start: call /audio/start, begin MediaRecorder, stream chunks
    // -----------------------------------------------------------------------
    async function onSpeechStart() {
      statusEl.textContent = 'Hearing you...';

      // 1. Open a session on the backend
      recordingId = crypto.randomUUID();
      try {
        const resp = await fetch('/audio/start', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Audio-Sample-Rate': String(audioCtx.sampleRate),
            'X-Audio-Encoding':    'webm',
            'X-Audio-Channels':    '1',
          },
          body: JSON.stringify({ chunk_id: recordingId, user_id: 'akshai' })
        });
        const data = await resp.json();
      } catch (e) {
        resultEl.textContent = '[Error starting session] ' + e.message;
        return;
      }

      // 2. Start MediaRecorder; each timeslice fires ondataavailable → stream chunk
      mediaRecorder = new MediaRecorder(stream);
      chunkMimeType = mediaRecorder.mimeType;

      mediaRecorder.ondataavailable = async (e) => {
        if (e.data.size === 0 || !recordingId) return;
        try {
          await fetch('/audio/stream', {
            method:  'POST',
            headers: {
              'Content-Type':    'application/octet-stream',
              'X-Chunk-Id':  recordingId,
            },
            body: e.data,
          });
        } catch (err) {
          console.warn('[stream] chunk send failed:', err);
        }
      };

      mediaRecorder.start(200); // emit a chunk every 200ms
    }

    // -----------------------------------------------------------------------
    // Speech-end: stop recorder, call /audio/end
    // -----------------------------------------------------------------------
    function onSpeechEnd(shouldTranscribe) {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') return;

      if (!shouldTranscribe) {
        // Too short — discard without transcribing
        mediaRecorder.stop();
        recordingId = null;
        statusEl.textContent = 'Listening...';
        return;
      }

      statusEl.textContent = 'Transcribing...';

      // Stop the recorder; wait for any final ondataavailable to fire, then end
      mediaRecorder.addEventListener('stop', async () => {
        // Give the last stream chunk a moment to be sent before calling /audio/end
        await new Promise(r => setTimeout(r, 150));

        const rid = recordingId;
        recordingId = null;

        try {
          const resp = await fetch('/audio/end', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chunk_id: rid, user_id: 'akshai' })
          });
          const data = await resp.json();
          if (resp.ok) {
            resultEl.textContent = data.transcript;
          } else {
            resultEl.textContent = '[Error] ' + (data.detail || JSON.stringify(data));
          }
        } catch (err) {
          resultEl.textContent = '[Network error] ' + err.message;
        }

        statusEl.textContent = 'Listening...';
      }, { once: true });

      mediaRecorder.stop();
    }

    init();
  </script>
</body>
</html>
