<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #080808;
    --card:    #111;
    --border:  #1e1e1e;
    --accent:  #ffffff;
    --muted:   #555;
    --success: #4ade80;
    --error:   #f87171;
    --warn:    #facc15;
    --text:    #e8e8e8;
    --text2:   #999;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px 80px;
  }

  .page { width: 100%; max-width: 720px; }

  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  label { display: block; color: var(--muted); font-size: 11px; letter-spacing: 0.06em; margin-bottom: 6px; }

  input, textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus { border-color: #333; }
  textarea { resize: vertical; min-height: 80px; }

  .field { margin-bottom: 16px; }

  button {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 9px 20px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
  .status-msg { font-size: 11px; color: var(--muted); margin-left: 4px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  .section-title {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .tag {
    font-size: 10px;
    border-radius: 4px;
    padding: 3px 7px;
    border: 1px solid;
  }
  .tag-connected  { background: #0f1f0f; border-color: #1a3a1a; color: var(--success); }
  .tag-missing    { background: #1a0808; border-color: #5a1a1a; color: var(--error); }
  .tag-neutral    { background: #111; border-color: #2a2a2a; color: var(--text2); }

  .integration-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  #response-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .third-party-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    margin-bottom: 20px;
    padding: 6px 10px;
    border-radius: 5px;
    border: 1px solid;
  }
  .tpi-yes  { background: #0e1a0e; border-color: #1e3a1e; color: var(--success); }
  .tpi-no   { background: #111; border-color: #222; color: var(--muted); }
  .tpi-warn { background: #1a1200; border-color: #3d2f00; color: var(--warn); }
</style>
</head>
<body>
<div class="page">
  <h1>Infer</h1>

  <div class="field">
    <label>USER ID</label>
    <input id="user-id" type="text" placeholder="your-user-id" />
  </div>

  <div class="field">
    <label>QUERY</label>
    <textarea id="prompt" placeholder="Ask anything…&#10;e.g. Send an email to my next meeting attendees"></textarea>
  </div>

  <div class="btn-row">
    <button id="ask-btn" onclick="ask()">Ask Gemma</button>
    <span id="status" class="status-msg"></span>
  </div>

  <div id="result-section" style="display:none">
    <hr class="divider">

    <div class="section-title">Connected Services</div>
    <div class="integration-row" id="connected-services"></div>

    <div class="section-title">3rd Party Analysis</div>
    <div id="tpi-indicator"></div>

    <div id="integrations-section" style="display:none">
      <div class="section-title">Required Integrations</div>
      <div class="integration-row" id="required-integrations"></div>
    </div>

    <div class="section-title">Response</div>
    <div id="response-box"></div>
  </div>
</div>

<script>
async function ask() {
  const userId = document.getElementById('user-id').value.trim();
  const prompt = document.getElementById('prompt').value.trim();
  if (!userId || !prompt) { alert('Fill in both User ID and Query.'); return; }

  const btn = document.getElementById('ask-btn');
  btn.disabled = true;
  document.getElementById('status').textContent = 'Asking Gemma…';
  document.getElementById('status').style.color = 'var(--muted)';
  document.getElementById('result-section').style.display = 'none';

  try {
    const res = await fetch('/infer/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, prompt }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || res.statusText);
    }
    const data = await res.json();
    render(data);
    document.getElementById('status').textContent = '';
  } catch (e) {
    document.getElementById('status').textContent = `Error: ${e.message}`;
    document.getElementById('status').style.color = 'var(--error)';
  } finally {
    btn.disabled = false;
  }
}

function render(data) {
  // Connected services
  const connectedBox = document.getElementById('connected-services');
  if (data.connected_services && data.connected_services.length) {
    connectedBox.innerHTML = data.connected_services
      .map(s => `<span class="tag tag-connected">${s}</span>`).join('');
  } else {
    connectedBox.innerHTML = '<span style="color:var(--muted);font-size:11px;">None</span>';
  }

  // 3rd party indicator
  const tpi = document.getElementById('tpi-indicator');
  const notConnected = data.not_connected || [];
  const connected    = data.connected || [];
  const required     = data.required_integrations || [];

  if (!data.involves_third_party) {
    tpi.className = 'third-party-indicator tpi-no';
    tpi.textContent = '— No third-party integration required';
  } else if (notConnected.length > 0) {
    tpi.className = 'third-party-indicator tpi-warn';
    tpi.textContent = `⚠ Requires integrations that are not connected: ${notConnected.join(', ')}`;
  } else {
    tpi.className = 'third-party-indicator tpi-yes';
    tpi.textContent = `✓ Third-party integration required — all connected`;
  }

  // Required integrations breakdown
  const intSection = document.getElementById('integrations-section');
  if (required.length) {
    intSection.style.display = 'block';
    document.getElementById('required-integrations').innerHTML = required.map(s => {
      const isConnected = (data.connected || []).includes(s);
      const cls = isConnected ? 'tag-connected' : 'tag-missing';
      const suffix = isConnected ? ' ✓' : ' ✕';
      return `<span class="tag ${cls}">${s}${suffix}</span>`;
    }).join('');
  } else {
    intSection.style.display = 'none';
  }

  // Response
  document.getElementById('response-box').textContent = data.response || '';
  document.getElementById('result-section').style.display = 'block';
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    if (document.activeElement === document.getElementById('prompt') ||
        document.activeElement === document.getElementById('user-id')) {
      ask();
    }
  }
});
</script>
</body>
</html>
