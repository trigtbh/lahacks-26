<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Voice Transcriber</title>
</head>
<body>
  <h1>Voice Transcriber</h1>
  <p id="status">Initializing mic...</p>
  <label>Silence threshold: <input type="range" id="thresholdSlider" min="1" max="60" value="12"> <span id="thresholdVal">12</span></label>
  <p><strong>Transcript:</strong></p>
  <pre id="result"></pre>

  <script>
    const status = document.getElementById('status');
    const result = document.getElementById('result');

    // --- VAD config ---
    let SILENCE_THRESHOLD = 12;    // 0–255 RMS; below this = silence (live-updated by slider)
    const SILENCE_DURATION_MS = 1500; // ms of silence before we consider speech done
    const MIN_SPEECH_MS = 400;        // ignore clips shorter than this

    let audioCtx, analyser, mediaRecorder, stream;
    let chunks = [];
    let isSpeaking = false;
    let speechStartTime = 0;
    let silenceStartTime = null;
    let vadInterval = null;

    const slider = document.getElementById('thresholdSlider');
    const thresholdVal = document.getElementById('thresholdVal');
    slider.addEventListener('input', () => {
      SILENCE_THRESHOLD = Number(slider.value);
      thresholdVal.textContent = slider.value;
    });

    async function init() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch (e) {
        status.textContent = 'Mic access denied: ' + e.message;
        return;
      }

      audioCtx = new AudioContext();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      source.connect(analyser);

      startRecorder();
      vadInterval = setInterval(vadTick, 100);
      status.textContent = 'Listening...';
    }

    function startRecorder() {
      chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = sendAudio;
      mediaRecorder.start(100); // collect a chunk every 100ms
    }

    function vadTick() {
      const buf = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(buf);

      // RMS of frequency magnitudes — simple volume proxy
      const rms = Math.sqrt(buf.reduce((s, v) => s + v * v, 0) / buf.length);
      const now = Date.now();

      if (rms > SILENCE_THRESHOLD) {
        // --- Sound detected ---
        if (!isSpeaking) {
          isSpeaking = true;
          speechStartTime = now;
          status.textContent = 'Hearing you...';
        }
        silenceStartTime = null; // reset silence clock
      } else {
        // --- Silence ---
        if (isSpeaking) {
          if (silenceStartTime === null) {
            silenceStartTime = now; // start counting silence
          } else if (now - silenceStartTime >= SILENCE_DURATION_MS) {
            // Silence long enough — trigger transcription
            isSpeaking = false;
            silenceStartTime = null;

            const speechDuration = now - speechStartTime;
            if (speechDuration >= MIN_SPEECH_MS) {
              status.textContent = 'Transcribing...';
              if (mediaRecorder.state === 'recording') {
                mediaRecorder.stop(); // fires onstop → sendAudio
              }
            } else {
              // Too short — discard and restart
              if (mediaRecorder.state === 'recording') mediaRecorder.stop();
              // onstop will still fire; sendAudio will restart the recorder
              // but we flag it as a discard
              chunks = []; // clear before stop so sendAudio sees empty
              status.textContent = 'Listening...';
            }
          }
        }
      }
    }

    async function sendAudio() {
      if (chunks.length === 0) {
        // Discarded clip — just restart
        startRecorder();
        status.textContent = 'Listening...';
        return;
      }

      const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
      chunks = [];

      // Restart recorder immediately so we keep capturing while we await the request
      startRecorder();

      try {
        const resp = await fetch('/transcribe', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/octet-stream',
            'X-Audio-Sample-Rate': String(audioCtx.sampleRate),
            'X-Audio-Encoding': 'webm',
            'X-Audio-Channels': '1',
            'X-User-Id': 'browser-user',
          },
          body: blob,
        });

        const data = await resp.json();
        if (resp.ok) {
          result.textContent = data.transcript;
        } else {
          result.textContent = '[Error] ' + (data.detail || JSON.stringify(data));
        }
      } catch (err) {
        result.textContent = '[Network error] ' + err.message;
      }

      status.textContent = 'Listening...';
    }

    init();
  </script>
</body>
</html>
