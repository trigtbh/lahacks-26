<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Workflow Tester</title>
    <!-- Modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color-1: #09090b;
            --bg-color-2: #18181b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% -20%, var(--bg-color-2), var(--bg-color-1) 80%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 4rem;
        }

        .app-container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.03em;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .chat-window {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            height: 400px;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .chat-window::-webkit-scrollbar {
            width: 6px;
        }

        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: messageSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes messageSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.1));
            border: 1px solid rgba(139, 92, 246, 0.3);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .json-block {
            background: rgba(0, 0, 0, 0.5);
            padding: 1rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #a78bfa;
            white-space: pre-wrap;
            margin-top: 0.75rem;
            border: 1px solid var(--glass-border);
        }

        .input-area {
            display: flex;
            gap: 1rem;
            position: relative;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px var(--primary-glow);
        }

        button:active {
            transform: translateY(0);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            padding: 1rem 1.25rem;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Flow Tester</h1>
            <p>Converse with Gemma to build your workflow</p>
        </div>

        <div class="chat-window" id="chatWindow">
            <div class="message bot">
                Hi! I am Flow. Tell me what you want to automate. (e.g. "Send an email to John saying hello")
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your request here..." autocomplete="off" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Generate a random session ID for this user session
        const sessionId = Math.random().toString(36).substring(2, 15);
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        function appendMessage(sender, text, workflowJson = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            let htmlContent = `<div>${text}</div>`;
            
            if (workflowJson) {
                htmlContent += `<div class="json-block">${JSON.stringify(workflowJson, null, 2)}</div>`;
            }

            msgDiv.innerHTML = htmlContent;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping(show) {
            if (show) {
                typingIndicator.style.display = 'block';
                chatWindow.appendChild(typingIndicator); // move to bottom
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } else {
                typingIndicator.style.display = 'none';
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            showTyping(true);

            try {
                const response = await fetch('/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_input: text,
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                showTyping(false);

                if (!response.ok) {
                    appendMessage('bot', `<strong>Server Error (${response.status}):</strong><br>${data.detail || JSON.stringify(data)}`);
                    return;
                }

                if (data.is_complete) {
                    appendMessage('bot', `<strong>${data.reply_message}</strong><br><br>Final Workflow Data:`, data.workflow);
                } else {
                    appendMessage('bot', data.reply_message);
                }
            } catch (error) {
                showTyping(false);
                appendMessage('bot', `Error connecting to server: ${error.message}`);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
